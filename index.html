<!DOCTYPE html>

@keyframes pulse {

/* Modal Styles */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.95);
  animation: fadeIn 0.3s;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-content {
  position: relative;
  background-color: #0a0a0a;
  margin: 20px auto;
  padding: 0;
  width: 95%;
  height: 90%;
  border-radius: 12px;

  border: 1px solid #22c55e;

}

}

@media (max-width: 768px) {

    height: 100%;

<body>
<div class="container">
  <h1>
    ⚽ TOP 5 LEAGUES & CUPS
    <span style="font-size: 12px; background: #22c55e20; padding: 4px 10px; border-radius: 20px;">LIVE & TODAY</span>
  </h1>
  
  <div class="api-key-section">
    <div class="api-key-input">
      <input type="password" id="apiKeyInput" placeholder="Enter your Football-Data.org API Key" value="">
      <button onclick="saveApiKey()">💾 Save Key</button>
    </div>
    <div class="api-note">
      ⚡ Get your free API key at <a href="https://www.football-data.org/client/register" target="_blank" style="color: #22c55e;">football-data.org</a> • Free tier: 10 calls/minute
    </div>
  </div>
  
  <div class="timezone-info" id="timezoneInfo">📍 Detecting your timezone...</div>
  <button class="refresh-btn" id="refreshBtn" onclick="fetchMatches()">🔄 LOAD MATCHES</button>
  <div id="output">
    <div class="loading">Enter your API key and click button to load matches</div>
  </div>
  <div class="stats" id="stats"></div>
</div>

<!-- Modal for iframe -->
<div id="streamModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">
        <span>🎬</span>
        <span id="modalMatchTitle">Live Stream</span>
      </div>
      <div class="modal-controls">
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
        <span class="close-modal">&times;</span>
      </div>
    </div>
    <iframe id="streamIframe" class="modal-iframe" src="" allowfullscreen></iframe>
  </div>
</div>

<script>
// Football-Data.org competition codes for Top 5 Leagues
const TOP_LEAGUES = {
  "PL": { name: "Premier League", country: "England", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", area: 2072, type: "league" },
  "PD": { name: "La Liga", country: "Spain", flag: "🇪🇸", area: 2224, type: "league" },
  "BL1": { name: "Bundesliga", country: "Germany", flag: "🇩🇪", area: 2088, type: "league" },
  "SA": { name: "Serie A", country: "Italy", flag: "🇮🇹", area: 2114, type: "league" },
  "FL1": { name: "Ligue 1", country: "France", flag: "🇫🇷", area: 2220, type: "league" }
};

// Top Cup competitions (Football-Data.org codes)
const TOP_CUPS = {
  "CL": { name: "UEFA Champions League", type: "cup", area: 2077 },
  "EL": { name: "UEFA Europa League", type: "cup", area: 2077 },
  "EC": { name: "UEFA Europa Conference League", type: "cup", area: 2077 },
  "FAC": { name: "FA Cup", type: "cup", area: 2072 },
  "ELC": { name: "EFL Cup", type: "cup", area: 2072 },
  "CDR": { name: "Copa del Rey", type: "cup", area: 2224 },
  "CIT": { name: "Coppa Italia", type: "cup", area: 2114 },
  "DFB": { name: "DFB Pokal", type: "cup", area: 2088 },
  "CDF": { name: "Coupe de France", type: "cup", area: 2220 }
};

// All allowed competitions
const ALLOWED_COMPETITIONS = { ...TOP_LEAGUES, ...TOP_CUPS };
const ALLOWED_CODES = Object.keys(ALLOWED_COMPETITIONS);

// CORS Proxies to try (in order)
const CORS_PROXIES = [
  "https://api.allorigins.win/raw?url=",
  "https://corsproxy.io/?"
];

let currentProxyIndex = 0;
let apiKey = localStorage.getItem('football_data_api_key') || '';

// Initialize API key from localStorage
document.getElementById('apiKeyInput').value = apiKey;

// Map of common short names to FULL names
const FULL_NAME_MAP = {
  "man utd": "manchester united",
  "manchester utd": "manchester united",
  "man city": "manchester city",
  "newcastle": "newcastle united",
  "west ham": "west ham united",
  "wolves": "wolverhampton wanderers",
  "spurs": "tottenham hotspur",
  "tottenham": "tottenham hotspur",
  "brighton": "brighton and hove albion",
  "leicester": "leicester city",
  "leeds": "leeds united",
  "barca": "barcelona",
  "real madrid": "real madrid",
  "atletico": "atletico madrid",
  "bayern": "bayern munich",
  "dortmund": "borussia dortmund",
  "inter": "inter milan",
  "milan": "ac milan",
  "juve": "juventus",
  "psg": "paris saint germain",
  "marseille": "olympique marseille",
  "lyon": "olympique lyonnais"
};

function saveApiKey() {
  const input = document.getElementById('apiKeyInput');
  apiKey = input.value.trim();
  if (apiKey) {
    localStorage.setItem('football_data_api_key', apiKey);
    alert('API Key saved!');
  } else {
    alert('Please enter a valid API key');
  }
}

function getFullTeamName(name) {
  if (!name) return "";
  const lowerName = name.toLowerCase().trim();
  
  if (FULL_NAME_MAP[lowerName]) {
    return FULL_NAME_MAP[lowerName];
  }
  
  for (const [key, fullName] of Object.entries(FULL_NAME_MAP)) {
    if (lowerName.includes(key)) {
      return fullName;
    }
  }
  
  return name;
}

function formatTeamName(name) {
  const fullName = getFullTeamName(name);
  
  return fullName
    .toLowerCase()
    .replace(/&/g, '')
    .replace(/\band\b/g, '')
    .replace(/[^a-z0-9\s]/g, '')
    .trim()
    .replace(/\s+/g, '-');
}

function getUserTimezone() {
  return Intl.DateTimeFormat().resolvedOptions().timeZone;
}

function getMatchTime(dateStr, timezone) {
  const date = new Date(dateStr);
  return date.toLocaleTimeString("en-GB", {
    timeZone: timezone,
    hour: "2-digit",
    minute: "2-digit"
  });
}

function getTimezoneAbbreviation() {
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('en', { timeZoneName: 'short' });
  const parts = formatter.formatToParts(now);
  const tzPart = parts.find(part => part.type === 'timeZoneName');
  return tzPart ? tzPart.value : '';
}

function isTodayInUserTimezone(dateStr, timezone) {
  const matchDate = new Date(dateStr).toLocaleDateString("en-CA", { timeZone: timezone });
  const today = new Date().toLocaleDateString("en-CA", { timeZone: timezone });
  return matchDate === today;
}

function isLiveMatch(status) {
  const liveStatuses = ["LIVE", "IN_PLAY", "PAUSED"];
  return liveStatuses.includes(status);
}

function getMatchMinute(match) {
  const status = match.status;
  
  if (status === "FINISHED") {
    return "Full Time";
  }
  
  if (status === "PAUSED") {
    return "Half Time";
  }
  
  if (match.minute) {
    return `${match.minute}'`;
  }
  
  return "LIVE";
}

function getMatchScore(match) {
  const homeScore = match.score.fullTime.home !== null ? match.score.fullTime.home : "?";
  const awayScore = match.score.fullTime.away !== null ? match.score.fullTime.away : "?";
  return { home: homeScore, away: awayScore };
}

function generateStreamUrls(homeTeam, awayTeam) {
  const team1 = formatTeamName(homeTeam);
  const team2 = formatTeamName(awayTeam);
  const baseUrl = `https://embedsports.top/embed/admin/ppv-${team1}-vs-${team2}`;
  return {
    link1: `${baseUrl}/1`,
    link2: `${baseUrl}/2`
  };
}

// Modal functions
const modal = document.getElementById("streamModal");
const iframe = document.getElementById("streamIframe");
const modalTitle = document.getElementById("modalMatchTitle");

function openStream(url, title) {
  iframe.src = url;
  modalTitle.innerHTML = `<span>🎬</span> ${title}`;
  modal.style.display = "block";
  document.body.style.overflow = "hidden";
}

function closeModal() {
  iframe.src = "";
  modal.style.display = "none";
  document.body.style.overflow = "auto";
}

function toggleFullscreen() {
  const modalContent = document.querySelector(".modal-content");
  if (!document.fullscreenElement) {
    modalContent.requestFullscreen().catch(err => {
      console.log(`Error attempting fullscreen: ${err.message}`);
    });
  } else {
    document.exitFullscreen();
  }
}

document.querySelector(".close-modal").onclick = closeModal;
window.onclick = function(event) {
  if (event.target === modal) {
    closeModal();
  }
}

document.addEventListener("keydown", function(event) {
  if (event.key === "Escape" && modal.style.display === "block") {
    closeModal();
  }
});

function displayTimezoneInfo() {
  const timezone = getUserTimezone();
  const abbreviation = getTimezoneAbbreviation();
  const infoDiv = document.getElementById("timezoneInfo");
  infoDiv.innerHTML = `🕐 Your timezone: ${timezone} ${abbreviation ? `(${abbreviation})` : ''}`;
}

async function fetchWithProxy(url, headers, proxyIndex = 0) {
  if (proxyIndex >= CORS_PROXIES.length) {
    throw new Error("All CORS proxies failed");
  }
  
  const proxy = CORS_PROXIES[proxyIndex];
  const targetUrl = encodeURIComponent(url);
  const proxyUrl = proxy + targetUrl;
  
  try {
    const response = await fetch(proxyUrl, { headers });
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    return await response.json();
  } catch (error) {
    console.log(`Proxy ${proxyIndex + 1} failed, trying next...`);
    return fetchWithProxy(url, headers, proxyIndex + 1);
  }
}

async function fetchMatches() {
  const outputDiv = document.getElementById("output");
  const statsDiv = document.getElementById("stats");
  const refreshBtn = document.getElementById("refreshBtn");
  const userTimezone = getUserTimezone();
  
  if (!apiKey) {
    outputDiv.innerHTML = '<div class="error">⚠️ Please enter your Football-Data.org API key above.</div>';
    return;
  }
  
  refreshBtn.disabled = true;
  outputDiv.innerHTML = '<div class="loading">📡 Fetching matches...</div>';
  statsDiv.innerHTML = '';
  
  try {
    const today = new Date().toISOString().split("T")[0];
    const url = `https://api.football-data.org/v4/matches?dateFrom=${today}&dateTo=${today}`;
    
    const data = await fetchWithProxy(url, {
      "X-Auth-Token": apiKey
    });
    
    const allMatches = data.matches || [];
    
    const relevantMatches = allMatches.filter(match => 
      ALLOWED_CODES.includes(match.competition.code)
    );
    
    if (relevantMatches.length === 0) {
      outputDiv.innerHTML = '<div class="no-matches">❌ No matches in Top 5 leagues or cups today.</div>';
      refreshBtn.disabled = false;
      return;
    }
    
    const liveMatches = [];
    const upcomingMatches = [];
    
    for (const match of relevantMatches) {
      const status = match.status;
      const isLive = isLiveMatch(status);
      const fixtureDate = match.utcDate;
      const isUpcoming = (status === "SCHEDULED" || status === "TIMED") && isTodayInUserTimezone(fixtureDate, userTimezone);
      
      if (isLive) {
        liveMatches.push(match);
      } else if (isUpcoming) {
        upcomingMatches.push(match);
      }
    }
    
    let outputHtml = '';
    
    if (liveMatches.length > 0) {
      outputHtml += `<div class="section-title">🔴 LIVE MATCHES</div>`;
      
      for (const match of liveMatches) {
        const originalHome = match.homeTeam.name;
        const originalAway = match.awayTeam.name;
        const fullHome = getFullTeamName(originalHome);
        const fullAway = getFullTeamName(originalAway);
        
        const competitionCode = match.competition.code;
        const isCup = TOP_CUPS[competitionCode];
        let competitionInfo, competitionName;
        
        if (isCup) {
          competitionInfo = TOP_CUPS[competitionCode];
          competitionName = competitionInfo.name;
        } else {
          competitionInfo = TOP_LEAGUES[competitionCode];
          competitionName = competitionInfo.name;
        }
        
        const homeLogo = match.homeTeam.crest || `https://via.placeholder.com/32/22c55e/000000?text=${fullHome.charAt(0)}`;
        const awayLogo = match.awayTeam.crest || `https://via.placeholder.com/32/22c55e/000000?text=${fullAway.charAt(0)}`;
        
        const urls = generateStreamUrls(fullHome, fullAway);
        const minute = getMatchMinute(match);
        const score = getMatchScore(match);
        const matchTitle = `${competitionName}: ${fullHome} vs ${fullAway}`;
        
        outputHtml += `
          <div class="match-card">
            <div class="league-header">
              <div class="league-name">
                ${competitionName}
                ${!isCup && competitionInfo.country ? `<span class="country-name">${competitionInfo.flag} ${competitionInfo.country}</span>` : ''}
                ${isCup ? '<span class="cup-badge">🏆 CUP</span>' : ''}
              </div>
            </div>
            <div class="match-body">
              <div class="match-status status-live live-pulse">🔴 LIVE ${minute !== "LIVE" ? `• ${minute}` : ''}</div>
              <div class="match-teams">
                <div class="team-row">
                  <div class="team">
                    <img class="team-logo" src="${homeLogo}" alt="${fullHome}" onerror="this.style.display='none'">
                    <span>${fullHome}</span>
                  </div>
                  <div class="score-display">
                    <span class="team-score">${score.home}</span>
                    <span class="vs">-</span>
                    <span class="team-score">${score.away}</span>
                  </div>
                  <div class="team">
                    <img class="team-logo" src="${awayLogo}" alt="${fullAway}" onerror="this.style.display='none'">
                    <span>${fullAway}</span>
                  </div>
                </div>
                ${minute !== "Full Time" && minute !== "Half Time" && minute !== "LIVE" ? `<div class="match-minute">⏱️ ${minute}</div>` : ''}
              </div>
              <div class="links-container">
                <div class="stream-link" onclick="openStream('${urls.link1}', '${matchTitle.replace(/'/g, "\\'")} - Link 1')">
                  <span class="link-label-1">▶ LINK 1</span>
                </div>
                <div class="stream-link" onclick="openStream('${urls.link2}', '${matchTitle.replace(/'/g, "\\'")} - Link 2')">
                  <span class="link-label-2">▶ LINK 2</span>
                </div>
              </div>
            </div>
          </div>
        `;
      }
    }
    
    if (upcomingMatches.length > 0) {
      outputHtml += `<div class="section-title">📅 UPCOMING TODAY</div>`;
      
      const matchesByLeague = {};
      
      for (const match of upcomingMatches) {
        const competitionCode = match.competition.code;
        if (!matchesByLeague[competitionCode]) {
          matchesByLeague[competitionCode] = [];
        }
        matchesByLeague[competitionCode].push(match);
      }
      
      for (const [competitionCode, matches] of Object.entries(matchesByLeague)) {
        const isCup = TOP_CUPS[competitionCode];
        let leagueInfo, leagueName, countryInfo;
        
        if (isCup) {
          leagueInfo = TOP_CUPS[competitionCode];
          leagueName = leagueInfo.name;
          countryInfo = null;
        } else {
          leagueInfo = TOP_LEAGUES[competitionCode];
          leagueName = leagueInfo.name;
          countryInfo = leagueInfo;
        }
        
        outputHtml += `
          <div class="league-group">
            <div class="league-group-header">
              <span class="league-group-name">${leagueName}</span>
              ${countryInfo ? `<span class="league-group-country">${countryInfo.flag} ${countryInfo.country}</span>` : '<span class="cup-badge">🏆 CUP</span>'}
            </div>
        `;
        
        for (const match of matches) {
          const originalHome = match.homeTeam.name;
          const originalAway = match.awayTeam.name;
          const fullHome = getFullTeamName(originalHome);
          const fullAway = getFullTeamName(originalAway);
          
          const matchTime = getMatchTime(match.utcDate, userTimezone);
          const homeLogo = match.homeTeam.crest || `https://via.placeholder.com/24/3b82f6/ffffff?text=${fullHome.charAt(0)}`;
          const awayLogo = match.awayTeam.crest || `https://via.placeholder.com/24/3b82f6/ffffff?text=${fullAway.charAt(0)}`;
          
          outputHtml += `
            <div class="upcoming-match">
              <div class="upcoming-time">⏰ ${matchTime}</div>
              <div class="upcoming-teams">
                <img class="upcoming-team-logo" src="${homeLogo}" onerror="this.style.display='none'">
                <span class="upcoming-team-name">${fullHome}</span>
                <span class="upcoming-vs">vs</span>
                <img class="upcoming-team-logo" src="${awayLogo}" onerror="this.style.display='none'">
                <span class="upcoming-team-name">${fullAway}</span>
              </div>
            </div>
          `;
        }
        
        outputHtml += `</div>`;
      }
    }
    
    if (liveMatches.length === 0 && upcomingMatches.length === 0) {
      outputDiv.innerHTML = '<div class="no-matches">📅 No live or upcoming matches right now.</div>';
    } else {
      outputDiv.innerHTML = outputHtml;
      statsDiv.innerHTML = `📊 ${liveMatches.length} LIVE • ${upcomingMatches.length} UPCOMING • ${new Date().toLocaleTimeString()}`;
    }
    
  } catch (error) {
    console.error(error);
    outputDiv.innerHTML = `<div class="error">⚠️ Error: ${error.message}<br><br>Try again or check your API key.</div>`;
  } finally {
    refreshBtn.disabled = false;
  }
}

displayTimezoneInfo();
</script>
</body>
</html>
